services:
  - type: web
    name: protoforge-api
    runtime: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: EVO2_NVIDIA_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://protoforge.vercel.app"
      - key: DATABASE_URL
        value: "sqlite:///./protoforge.db"
    disk:
      name: protoforge-data
      mountPath: /app/backend
      sizeGB: 1
